<!DOCTYPE html>
<html>
<head>
    <title>Text To Speech Converter</title>
</head>
<body>

<h1>Text To Speech Converter</h1>

<form action="/convert" method="POST">

    <textarea
        name="text"
        rows="10"
        cols="60"
        placeholder="Enter text here..."
        required>
    </textarea>

    <br><br>

    <button type="submit">
        Convert
    </button>

</form>

{% if audio_data %}

<h2>Audio Output</h2>

<audio controls>
    <source
        src="data:audio/mp3;base64,{{ audio_data }}"
        type="audio/mp3">
</audio>

<br><br>

<a href="data:audio/mp3;base64,{{ audio_data }}"
   download="speech.mp3">
   Download Audio
</a>

{% endif %}

</body>
</html>
