<!DOCTYPE html>
<html>

<head>
    <title>Text To Speech Converter</title>
</head>

<body>

    <h1>Text To Speech Converter</h1>

    <form action="/convert" method="POST">

        <textarea
            name="text"
            rows="10"
            cols="60"
            placeholder="Enter text here..."
            required>{{ text if text else '' }}</textarea>

        <br><br>

        <label>Voice:</label>

        <select name="gender">

            <option value="male"
                {% if gender=="male" %}selected{% endif %}>
                Male
            </option>

            <option value="female"
                {% if gender=="female" %}selected{% endif %}>
                Female
            </option>

        </select>

        <br><br>

        <label>Speed:</label>

        <select name="speed">

            <option value="-50%"
                {% if speed=="-50%" %}selected{% endif %}>
                0.5x
            </option>

            <option value="-25%"
                {% if speed=="-25%" %}selected{% endif %}>
                0.75x
            </option>

            <option value="-15%"
                {% if speed=="-15%" %}selected{% endif %}>
                0.85x
            </option>

            <option value="-5%"
                {% if speed=="-5%" %}selected{% endif %}>
                0.95x
            </option>

            <option value="+0%"
                {% if speed=="+0%" %}selected{% endif %}>
                1x
            </option>

            <option value="+25%"
                {% if speed=="+25%" %}selected{% endif %}>
                1.25x
            </option>

            <option value="+50%"
                {% if speed=="+50%" %}selected{% endif %}>
                1.5x
            </option>

            <option value="+100%"
                {% if speed=="+100%" %}selected{% endif %}>
                2x
            </option>

        </select>

        <br><br>

        <button type="submit">
            Generate Audio
        </button>

    </form>

    {% if audio_data %}

    <hr>

    <h2>Audio Output</h2>

    <audio controls>
        <source
            src="data:audio/mp3;base64,{{ audio_data }}"
            type="audio/mp3">
    </audio>

    <br><br>

    <a href="data:audio/mp3;base64,{{ audio_data }}"
       download="speech.mp3">
       Download Audio
    </a>

    {% endif %}

</body>

</html>
